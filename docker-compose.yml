version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: monitor-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: monitor
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    # 可选：让后端等 MySQL 就绪更稳一些
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: monitor-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    ports:
      - "5672:5672"
      - "15672:15672"

  influxdb:
    image: influxdb:2.7
    container_name: monitor-influxdb
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin123456
      DOCKER_INFLUXDB_INIT_ORG: dev
      DOCKER_INFLUXDB_INIT_BUCKET: monitor
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: dev-token
    ports:
      - "8086:8086"
    volumes:
      - influx-data:/var/lib/influxdb2

  minio:
    image: minio/minio:RELEASE.2024-03-15T01-07-19Z
    container_name: monitor-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: StrongPassw0rd!
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  redis:
    image: redis:7-alpine
    container_name: monitor-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./monitor_server
    container_name: monitor-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      influxdb:
        condition: service_started
      minio:
        condition: service_started
      redis:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/monitor?useUnicode=true&characterEncoding=utf8&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456

      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: admin
      SPRING_RABBITMQ_PASSWORD: admin

      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: dev-token
      INFLUX_ORG: dev
      INFLUX_BUCKET: monitor

      SPRING_MINIO_ENDPOINT: http://minio:9000
      SPRING_MINIO_USERNAME: minioadmin
      SPRING_MINIO_PASSWORD: StrongPassw0rd!

      # 关键：后端连接 Redis 不能再用 localhost
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_URL: redis://redis:6379
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

      # 保持服务内部监听 80（你的日志就是 80）
      SERVER_PORT: 80
    ports:
      - "8080:80"# 宿主 8080 -> 容器 80（方便你本机调试）


  frontend:
    build:
      context: ./monitor-web
      args:
        # 让前端走相对路径 /api，由 Nginx 反代到 backend
        VITE_API_BASE: ""   # 或者直接去掉 args 节
    container_name: monitor-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql-data:
  influx-data:
  minio-data:
